<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Stock Pattern Analyzer</title>
<link rel="manifest" href="data:application/json,{}">
<meta name="theme-color" content="#0a0a10">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a10;color:#F0ECE3;font-family:'Outfit',sans-serif;min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#333;border-radius:4px}
.mono{font-family:'DM Mono',monospace}.noto{font-family:'Noto Sans KR',sans-serif;font-weight:300}
.wrap{max-width:1200px;margin:0 auto;padding:0 24px}

/* Tabs */
.tabs{display:flex;gap:0;border-bottom:1px solid #1e1e2e;margin-bottom:24px}
.tab-btn{padding:14px 28px;border:none;cursor:pointer;background:transparent;border-bottom:2px solid transparent;color:#555;font-size:13px;font-weight:400;font-family:'DM Mono',monospace;transition:all 0.2s}
.tab-btn.active{border-bottom-color:#C9A96E;color:#C9A96E;font-weight:600}

/* Header */
.hdr{padding:32px 0 12px}.hdr .tag{font-size:9px;color:#C9A96E;font-family:'DM Mono',monospace;letter-spacing:0.25em;display:flex;align-items:center;gap:10px;margin-bottom:6px}
.hdr .diamond{width:9px;height:9px;border:1.5px solid #C9A96E;transform:rotate(45deg);animation:pulse 2.4s ease infinite}
.hdr h1{font-size:clamp(26px,3.5vw,38px);font-weight:800;background:linear-gradient(135deg,#F0ECE3 30%,#C9A96E 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.03em}

/* Search */
.search-wrap{position:relative;margin-bottom:12px}
.search-bar{display:flex;gap:8px;background:#0e0e16;border:1px solid #2a2a3a;border-radius:12px;padding:5px}
.search-bar input{flex:1;background:transparent;border:none;outline:none;padding:12px 16px;color:#F0ECE3;font-size:14px;font-family:'DM Mono',monospace}
.search-bar button{padding:10px 24px;border-radius:8px;border:none;cursor:pointer;background:linear-gradient(135deg,#C9A96E,#A88B5A);color:#0a0a10;font-size:12px;font-weight:600;font-family:'DM Mono',monospace}
.search-bar button:disabled{background:#2a2a3a;cursor:wait}
#searchDrop{display:none;position:absolute;top:100%;left:0;right:0;background:#12121a;border:1px solid #2a2a3a;border-radius:0 0 12px 12px;border-top:none;z-index:100;max-height:280px;overflow-y:auto}
.drop-item{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;cursor:pointer;border-bottom:1px solid #1a1a28;transition:background 0.1s}
.drop-item:hover{background:#1a1a28}

.pill{padding:4px 10px;border-radius:20px;border:1px solid #1e1e2e;background:transparent;color:#666;font-size:10px;cursor:pointer;font-family:'DM Mono',monospace;transition:all 0.15s}
.pill:hover,.pill.on{border-color:#C9A96E;color:#C9A96E}
.tf-bar{display:flex;gap:2px;background:#12121a;border-radius:7px;padding:2px}
.tf-btn{padding:4px 10px;border-radius:5px;border:none;cursor:pointer;font-family:'DM Mono',monospace;font-size:10px;background:transparent;color:#555;transition:all 0.1s}
.tf-btn.on{background:rgba(201,169,110,0.2);color:#C9A96E;font-weight:600}
.src-btn{padding:4px 9px;border-radius:5px;border:none;cursor:pointer;font-family:'DM Mono',monospace;font-size:9px;background:transparent;color:#555}
.src-btn.on{background:rgba(78,204,163,0.12);color:#4ECCA3}

/* Cards / Grids */
.card{background:#0e0e16;border:1px solid #1e1e2e;border-radius:12px;padding:16px;margin-bottom:10px}
.badge{font-size:9px;padding:3px 8px;border-radius:16px;font-family:'DM Mono',monospace}
.sg{display:grid;gap:8px;margin-bottom:20px}
.si{background:#0e0e16;border:1px solid #1e1e2e;border-radius:8px;padding:10px}
.si .l{font-size:8px;color:#555;font-family:'DM Mono',monospace;letter-spacing:0.06em;margin-bottom:3px}
.si .v{font-size:13px;font-weight:600;font-family:'DM Mono',monospace}
.chart-box{background:#0a0a12;border-radius:12px;border:1px solid #1e1e2e;padding:12px 8px 4px;margin-bottom:16px}

/* Watchlist */
.wl-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid #1a1a28;cursor:pointer;transition:background 0.15s}
.wl-item:hover{background:#12121a}
.wl-signal{font-size:9px;padding:2px 8px;border-radius:12px;font-family:'DM Mono',monospace}

/* Loading & misc */
.loading{text-align:center;padding:50px 0}
.dot{width:8px;height:8px;border-radius:50%;background:#C9A96E;display:inline-block;animation:pulse 1.2s ease infinite}
.dot:nth-child(2){animation-delay:0.2s}.dot:nth-child(3){animation-delay:0.4s}
@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeIn 0.3s ease}
</style>
</head>
<body>
<div class="wrap">
<div class="hdr">
  <div class="tag"><div class="diamond"></div>STOCK PATTERN ANALYZER v2</div>
  <h1>종목 패턴 분석</h1>
</div>

<!-- Tabs -->

<!-- ═══════ TAB: Analyze ═══════ -->
<div id="tabAnalyze">
  <div class="search-wrap">
    <div class="search-bar">
      <input id="symInput" placeholder="종목명 또는 티커 (삼성전자, Apple, AAPL, bitcoin)" autocomplete="off"/>

    <div style="flex:1"></div>
    <div class="tf-bar" id="srcBar">
      <button class="src-btn on" data-s="yahoo" onclick="setSrc('yahoo')">Yahoo</button>
      <button class="src-btn" data-s="naver" onclick="setSrc('naver')">네이버</button>

      <button class="tf-btn" data-t="1m" onclick="setTf('1m')">1분</button>
      <button class="tf-btn" data-t="5m" onclick="setTf('5m')">5분</button>
      <button class="tf-btn" data-t="10m" onclick="setTf('10m')">10분</button>
      <button class="tf-btn" data-t="30m" onclick="setTf('30m')">30분</button>
      <button class="tf-btn" data-t="60m" onclick="setTf('60m')">1시간</button>
      <button class="tf-btn" data-t="4h" onclick="setTf('4h')">4시간</button>
      <button class="tf-btn on" data-t="1d" onclick="setTf('1d')">일봉</button>
      <button class="tf-btn" data-t="1wk" onclick="setTf('1wk')">주봉</button>
      <button class="tf-btn" data-t="1mo" onclick="setTf('1mo')">월봉</button>
    </div>
    <button class="pill" id="addWlBtn" onclick="addToWatchlist()" style="display:none;border-color:#C9A96E40;color:#C9A96E">+ 워치리스트</button>
  </div>
  <div id="analyzeOut"></div>
  <div id="loadEl" style="display:none" class="loading"><span class="dot"></span> <span class="dot"></span> <span class="dot"></span><p id="loadMsg" class="noto" style="color:#666;font-size:12px;margin-top:14px"></p></div>
  <div id="errEl" style="display:none;background:rgba(232,93,117,0.06);border:1px solid rgba(232,93,117,0.2);border-radius:10px;padding:16px;margin-bottom:16px"><p id="errMsg" style="color:#E85D75;font-size:12px" class="noto"></p></div>
  <div id="emptyEl" style="text-align:center;padding:60px 0"><div style="font-size:40px;opacity:0.1;margin-bottom:12px">◇</div><p class="noto" style="color:#555;font-size:13px;line-height:1.8">종목명 또는 티커를 입력하면<br>실시간 가격 + AI 패턴 분석이 시작됩니다</p></div>
</div>

<!-- ═══════ TAB: Watchlist ═══════ -->
<div id="tabWatchlist" style="display:none">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <div style="display:flex;align-items:center;gap:10px">
      <span class="mono" style="font-size:11px;color:#C9A96E;letter-spacing:0.1em">관심종목</span>
      <span id="wlCount" class="mono" style="font-size:10px;color:#555"></span>
    </div>
    <div style="display:flex;gap:8px">
      <button class="pill" onclick="scanWatchlist()">전체 스캔</button>
      <button class="pill" onclick="clearWatchlist()" style="border-color:#E85D7540;color:#E85D75">전체 삭제</button>
    </div>
  </div>
  <div id="wlScanMsg" style="display:none" class="loading"><span class="dot"></span> <span class="dot"></span> <span class="dot"></span><p class="noto" style="color:#666;font-size:12px;margin-top:12px">워치리스트 스캔 중...</p></div>
  <div id="wlList"></div>
  <div id="wlEmpty" style="text-align:center;padding:60px 0"><div style="font-size:40px;opacity:0.1;margin-bottom:12px">◇</div><p class="noto" style="color:#555;font-size:13px;line-height:1.8">종목 분석 후 "워치리스트 추가" 버튼을 눌러<br>관심종목을 등록하세요</p></div>
</div>

<!-- ═══════ TAB: Patterns Learning ═══════ -->
<div id="tabPatterns" style="display:none">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <span class="mono" style="font-size:11px;color:#C9A96E;letter-spacing:0.1em">35개 차트 패턴 레퍼런스</span>
    <div class="tf-bar" id="patCatBar">
      <button class="tf-btn on" data-c="all" onclick="filterPat('all')">전체</button>
      <button class="tf-btn" data-c="reversal" onclick="filterPat('reversal')">반전</button>
      <button class="tf-btn" data-c="continuation" onclick="filterPat('continuation')">지속</button>
      <button class="tf-btn" data-c="candlestick" onclick="filterPat('candlestick')">캔들</button>
      <button class="tf-btn" data-c="harmonic" onclick="filterPat('harmonic')">하모닉</button>
    </div>
  </div>
  <div id="patList"></div>
</div>

<div style="border-top:1px solid #1a1a28;padding:16px 0 32px;margin-top:32px"><p class="mono" style="font-size:9px;color:#444;text-align:center">※ 교육·학습 목적 참고 자료이며, 투자 판단의 근거로 사용할 수 없습니다.</p></div>
</div>

<script>
// ═══════ STATE ═══════
let src="yahoo",tf="1d",curData=null,curSym=null,selSym=null;
let viewStart=0,viewEnd=260; // visible candle range (indices into ohlcv)
let isDragging=false,dragStartX=0,dragStartViewStart=0;
let watchlist=JSON.parse(localStorage.getItem("wl")||"[]");

// ═══════ TABS ═══════
function switchTab(t){
  document.querySelectorAll(".tab-btn").forEach((b,i)=>b.classList.toggle("active",i===(t==="analyze"?0:t==="watchlist"?1:2)));
  document.getElementById("tabAnalyze").style.display=t==="analyze"?"block":"none";
  document.getElementById("tabWatchlist").style.display=t==="watchlist"?"block":"none";
  document.getElementById("tabPatterns").style.display=t==="patterns"?"block":"none";
  if(t==="watchlist")renderWatchlist();
  if(t==="patterns")renderPatterns();
}

// ═══════ CONTROLS ═══════
function setSrc(s){src=s;document.querySelectorAll("#srcBar .src-btn").forEach(b=>b.classList.toggle("on",b.dataset.s===s));}
function setTf(t){tf=t;document.querySelectorAll("#tfBar .tf-btn").forEach(b=>b.classList.toggle("on",b.dataset.t===t));if(curData)fetchData();}
function resetView(totalLen){viewStart=Math.max(0,totalLen-260);viewEnd=totalLen;}
function reRender(){if(curData)render(curData,null);}
function qk(s,sr){document.getElementById("symInput").value=s;selSym={symbol:s,source:sr};setSrc(sr);hideDrop();fetchData();}

// ═══════ AUTOCOMPLETE ═══════
let sTimer=null;const inp=document.getElementById("symInput"),drop=document.getElementById("searchDrop");
inp.addEventListener("input",()=>{selSym=null;const q=inp.value.trim();if(q.length<1){hideDrop();return;}clearTimeout(sTimer);sTimer=setTimeout(()=>searchSym(q),300);});
inp.addEventListener("keydown",e=>{if(e.key==="Enter"){hideDrop();fetchData();}if(e.key==="Escape")hideDrop();});
document.addEventListener("click",e=>{if(!e.target.closest(".search-wrap"))hideDrop();});
function hideDrop(){drop.style.display="none";}
async function searchSym(q){
  try{const r=await(await fetch("/api/search?q="+encodeURIComponent(q))).json();
  if(!r.results?.length){hideDrop();return;}
  const sc={yahoo:"#85C1E9",naver:"#E8A87C",coingecko:"#7DCEA0"};
  drop.innerHTML=r.results.map((it,i)=>`<div class="drop-item" onclick="pickSym(${i})"><div><div style="font-size:12px;color:#F0ECE3;font-weight:500">${it.name}</div><div style="font-size:10px;color:#666;font-family:'DM Mono',monospace;margin-top:1px">${it.symbol}${it.exchange?" · "+it.exchange:""}</div></div><span style="font-size:8px;padding:2px 7px;border-radius:10px;font-family:'DM Mono',monospace;color:${sc[it.source]||"#666"};background:${sc[it.source]||"#666"}12;border:1px solid ${sc[it.source]||"#666"}25">${it.source}</span></div>`).join("");
  drop.style.display="block";drop._items=r.results;
  }catch(e){hideDrop();}
}
function pickSym(i){const it=drop._items[i];if(!it)return;const s=it.naverCode||it.symbol;inp.value=it.name+" ("+s+")";selSym={symbol:s,source:it.source,name:it.name};setSrc(it.source);hideDrop();fetchData();}

// ═══════ INDICATORS (pure math) ═══════
function calcRSI(c,n=14){if(c.length<n+1)return null;let g=0,l=0;for(let i=1;i<=n;i++){const d=c[i]-c[i-1];d>0?g+=d:l+=Math.abs(d);}let ag=g/n,al=l/n;for(let i=n+1;i<c.length;i++){const d=c[i]-c[i-1];ag=(ag*(n-1)+(d>0?d:0))/n;al=(al*(n-1)+(d<0?Math.abs(d):0))/n;}return al===0?100:+(100-100/(1+ag/al)).toFixed(1);}
function calcMACD(c){if(c.length<26)return{v:null,s:null,h:null,series:[]};const ema=(d,n)=>{const k=2/(n+1);let e=[d[0]];for(let i=1;i<d.length;i++)e.push(d[i]*k+e[i-1]*(1-k));return e;};const e12=ema(c,12),e26=ema(c,26);const ml=e12.map((v,i)=>v-e26[i]);const sl=Array(34).fill(null).concat(ema(ml.slice(26),9));const hl=ml.map((v,i)=>sl[i]!=null?v-sl[i]:null);return{v:+ml[ml.length-1].toFixed(2),s:sl[sl.length-1]!=null?+sl[sl.length-1].toFixed(2):null,h:hl[hl.length-1]!=null?+hl[hl.length-1].toFixed(2):null,ml,sl,hl};}
function calcMA(c,n){return c.length>=n?+(c.slice(-n).reduce((a,b)=>a+b,0)/n).toFixed(2):null;}
function calcBB(c,n=20,k=2){if(c.length<n)return null;const ma=c.slice(-n).reduce((a,b)=>a+b,0)/n;const std=Math.sqrt(c.slice(-n).reduce((s,v)=>s+Math.pow(v-ma,2),0)/n);return{upper:+(ma+k*std).toFixed(2),middle:+ma.toFixed(2),lower:+(ma-k*std).toFixed(2)};}
function calcStoch(ohlcv,n=14){if(ohlcv.length<n)return null;const s=ohlcv.slice(-n);const hi=Math.max(...s.map(d=>d.high)),lo=Math.min(...s.map(d=>d.low));const c=s[s.length-1].close;return hi===lo?50:+((c-lo)/(hi-lo)*100).toFixed(1);}

// ═══════ FETCH DATA (chart only, no AI) ═══════
async function fetchData(){
  let sym,sr;if(selSym){sym=selSym.symbol;sr=selSym.source||src;setSrc(sr);}else{sym=inp.value.trim();sr=src;}
  if(!sym)return;curSym={symbol:sym,source:sr,name:selSym?.name||sym};
  const btn=document.getElementById("goBtn"),ld=document.getElementById("loadEl"),out=document.getElementById("analyzeOut"),err=document.getElementById("errEl"),emp=document.getElementById("emptyEl");
  btn.disabled=true;btn.textContent="...";ld.style.display="block";out.innerHTML="";err.style.display="none";emp.style.display="none";
  document.getElementById("addWlBtn").style.display="none";
  window._lastAI=null;
  try{
    document.getElementById("loadMsg").textContent="실제 가격 데이터 수신 중...";
    const r=await(await fetch(`/api/stock?symbol=${encodeURIComponent(sym)}&source=${sr}&interval=${tf}`)).json();
    if(r.error)throw new Error(r.error);if(!r.ohlcv?.length)throw new Error("데이터 없음. 티커 확인.");
    curData=r;
    resetView(r.ohlcv.length);
    render(r,null);
    document.getElementById("addWlBtn").style.display="inline-block";
  }catch(e){err.style.display="block";document.getElementById("errMsg").textContent=e.message;
  }finally{btn.disabled=false;btn.textContent="분석";ld.style.display="none";}
}

// ═══════ AI PATTERN ANALYSIS (manual trigger) ═══════
async function doAiAnalyze(){
  if(!curData){alert("먼저 종목을 검색하세요.");return;}
  const r=curData;
  const sym=curSym?.symbol||"";
  const aiBtn=document.getElementById("aiAnalyzeBtn");
  const aiOut=document.getElementById("aiResultArea");
  if(aiBtn){aiBtn.disabled=true;aiBtn.textContent="🔄 AI 분석중...";}
  if(aiOut)aiOut.innerHTML=`<div class="loading" style="padding:30px 0"><span class="dot"></span> <span class="dot"></span> <span class="dot"></span><p class="noto" style="color:#666;font-size:12px;margin-top:10px">AI가 35개 패턴과 대조 분석 중...</p></div>`;

  let ai=null;let aiErr="";let aiDebug="";
  try{
    const cp=r.currentPrice||r.ohlcv[r.ohlcv.length-1].close;
    const closes=r.ohlcv.map(d=>d.close);
    const h52=Math.max(...r.ohlcv.map(d=>d.high)),l52=Math.min(...r.ohlcv.map(d=>d.low));
    const _rsi=calcRSI(closes);
    const _macd=calcMACD(closes);
    const _bb=calcBB(closes);
    const _stoch=calcStoch(r.ohlcv);
    const _ma5=calcMA(closes,5),_ma20=calcMA(closes,20),_ma100=calcMA(closes,100),_ma250=calcMA(closes,250);
    const vols=r.ohlcv.map(d=>d.volume).filter(v=>v>0);
    const avgVol=vols.length>=20?vols.slice(-20).reduce((a,b)=>a+b,0)/20:null;
    const lastVol=vols.length?vols[vols.length-1]:null;
    const volRatio=avgVol&&lastVol?(lastVol/avgVol).toFixed(2):null;
    const recent=r.ohlcv.slice(-50).map(d=>`${d.date}:${d.open},${d.high},${d.low},${d.close},${d.volume}`).join("\n");

    const prompt = `당신은 전문 차트 패턴 분석가입니다. 아래 실제 거래소 API 데이터를 기반으로, 제공된 35개 패턴 레퍼런스와 대조하여 정밀 분석하세요.

═══ 35개 패턴 레퍼런스 (이름|카테고리|방향|상승확률|하락확률|평균상승|평균하락) ═══
헤드앤숄더|reversal|bearish|23%|77%|+18%|-15%
역헤드앤숄더|reversal|bullish|79%|21%|+22%|-8%
이중바닥(W)|reversal|bullish|74%|26%|+15%|-9%
이중천장(M)|reversal|bearish|28%|72%|+13%|-16%
트리플바닥|reversal|bullish|87%|13%|+20%|-8%
트리플천장|reversal|bearish|13%|87%|+20%|-20%
라운딩바닥|reversal|bullish|72%|28%|+25%|-10%
라운딩탑|reversal|bearish|28%|72%|+20%|-22%

function render(data,ai){
  const allData=data.ohlcv;
  const o=allData.slice(viewStart,viewEnd); // interactive zoom range
  const cp=data.currentPrice||o[o.length-1].close,pv=o.length>1?o[o.length-2].close:cp;
  const ch=((cp-pv)/pv*100).toFixed(2),cs=data.currency==="KRW"?"₩":"$",fp=v=>Number(v).toLocaleString(undefined,{maximumFractionDigits:2});
  const cls=o.map(d=>d.close),h52=Math.max(...o.map(d=>d.high)),l52=Math.min(...o.map(d=>d.low));
  const rsi=calcRSI(cls),macd=calcMACD(cls),bb=calcBB(cls),stoch=calcStoch(o);
  const ma5=calcMA(cls,5),ma20=calcMA(cls,20),ma100=calcMA(cls,100),ma250=calcMA(cls,250);
  const rc=rsi>70?"#E85D75":rsi<30?"#4ECCA3":"#C9A96E",mc=macd.h>0?"#4ECCA3":macd.h<0?"#E85D75":"#C9A96E";

  const stockFullName = data.name || curSym?.name || data.symbol;
  const stockCode = data.symbol || curSym?.symbol || "";
  const stockLabel = stockFullName !== stockCode ? `${stockFullName} (${stockCode})` : stockFullName;

  let h=`<div class="fade">
  <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #1e1e2e">
    <div><h2 style="font-size:24px;font-weight:800;color:#F0ECE3">${stockFullName}</h2>
    <div style="display:flex;gap:6px;margin-top:3px"><span class="mono" style="font-size:11px;color:#888">${stockCode}</span><span class="badge" style="background:rgba(78,204,163,0.08);color:#4ECCA3;border:1px solid rgba(78,204,163,0.15)">● ${data.source}</span><span class="badge" style="background:rgba(201,169,110,0.08);color:#C9A96E;border:1px solid rgba(201,169,110,0.15)">${o.length}봉·${tf}</span><span class="mono" style="font-size:8px;color:#555">${new Date(data.fetchedAt).toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false})}</span></div></div>
    <div style="text-align:right"><div class="mono" style="font-size:28px;font-weight:700">${cs}${fp(cp)}</div><div class="mono" style="font-size:13px;margin-top:2px;color:${ch>=0?"#4ECCA3":"#E85D75"}">${ch>=0?"▲":"▼"} ${Math.abs(ch)}%</div></div>
  </div>
  <div id="mainChartWrap" class="chart-box" style="cursor:grab;user-select:none">${svgChart(o,cp,data.currency,ai,stockLabel)}</div>
  <div class="mono" style="font-size:8px;color:#444;text-align:center;margin:-12px 0 14px">마우스 휠: 줌 · 클릭&드래그: 이동 · 표시: ${o.length}봉 / 전체 ${allData.length}봉</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
    <div class="chart-box" style="margin-bottom:0">${svgRSI(o)}</div>
    <div class="chart-box" style="margin-bottom:0">${svgMACD(o)}</div>
  </div>
  <div class="sg" style="grid-template-columns:repeat(auto-fill,minmax(95px,1fr))">
    ${[{l:"52W High",v:fp(h52),c:"#4ECCA3"},{l:"52W Low",v:fp(l52),c:"#E85D75"},{l:"RSI(14)",v:rsi??"-",c:rc},{l:"MACD",v:macd.v??"-",c:mc},{l:"Signal",v:macd.s??"-",c:"#E8A87C"},{l:"Histogram",v:macd.h??"-",c:macd.h>0?"#4ECCA3":"#E85D75"},{l:"Stoch %K",v:stoch??"-",c:stoch>80?"#E85D75":stoch<20?"#4ECCA3":"#C9A96E"},{l:"BB Upper",v:bb?fp(bb.upper):"-",c:"#C39BD3"},{l:"BB Lower",v:bb?fp(bb.lower):"-",c:"#C39BD3"},{l:"MA5",v:ma5?fp(ma5):"-",c:"#E8A87C"},{l:"MA20",v:ma20?fp(ma20):"-",c:"#85C1E9"},{l:"MA100",v:ma100?fp(ma100):"-",c:"#C39BD3"},{l:"MA250",v:ma250?fp(ma250):"-",c:"#7DCEA0"},{l:"추세",v:ai?.trend==="uptrend"?"상승":ai?.trend==="downtrend"?"하락":"횡보",c:ai?.trend==="uptrend"?"#4ECCA3":"#E85D75"}].map(s=>`<div class="si"><div class="l">${s.l}</div><div class="v" style="color:${s.c}">${s.v}</div></div>`).join("")}
  </div>`;

  // AI Analysis Button + Result Area
  h+=`<div style="margin-bottom:16px">
    <button id="aiAnalyzeBtn" onclick="doAiAnalyze()" style="width:100%;padding:14px;border-radius:10px;border:1px solid rgba(201,169,110,0.3);background:linear-gradient(135deg,rgba(201,169,110,0.1),rgba(201,169,110,0.03));color:#C9A96E;font-size:14px;font-weight:600;font-family:'DM Mono',monospace;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.2s" onmouseenter="this.style.background='linear-gradient(135deg,rgba(201,169,110,0.2),rgba(201,169,110,0.08))'" onmouseleave="this.style.background='linear-gradient(135deg,rgba(201,169,110,0.1),rgba(201,169,110,0.03))'">
      <span style="font-size:16px">🔍</span> AI 차트 패턴분석
    </button>
  </div>
  <div id="aiResultArea"></div>`;

  h+=`</div>`;
  document.getElementById("analyzeOut").innerHTML=h;

  // ── Bind mouse wheel + drag events to chart ──
  const chartEl=document.getElementById("mainChartWrap");
  if(chartEl&&curData){
    const total=curData.ohlcv.length;
    // Wheel zoom
    chartEl.onwheel=(e)=>{
      e.preventDefault();
      const visLen=viewEnd-viewStart;
      const zoomDir=e.deltaY>0?1:-1; // scroll down=zoom out, up=zoom in
      const step=Math.max(2,Math.round(visLen*0.15));
      if(zoomDir>0){// zoom out
        viewStart=Math.max(0,viewStart-step);
        viewEnd=Math.min(total,viewEnd+step);
      }else{// zoom in
        if(visLen>20){
          viewStart=Math.min(viewEnd-20,viewStart+step);
          viewEnd=Math.max(viewStart+20,viewEnd-step);
        }
      }
      render(curData,null);
    };
    // Drag pan
    chartEl.onmousedown=(e)=>{isDragging=true;dragStartX=e.clientX;dragStartViewStart=viewStart;chartEl.style.cursor="grabbing";};
    chartEl.onmousemove=(e)=>{
      if(!isDragging)return;
      const dx=e.clientX-dragStartX;
      const visLen=viewEnd-viewStart;
      const pxPerCandle=chartEl.offsetWidth/(visLen||1);
      const shift=Math.round(-dx/pxPerCandle);
      const newStart=Math.max(0,Math.min(total-visLen,dragStartViewStart+shift));
      viewStart=newStart;viewEnd=newStart+visLen;
      render(curData,null);
    };
    chartEl.onmouseup=chartEl.onmouseleave=()=>{if(isDragging){isDragging=false;chartEl.style.cursor="grab";}};
    // Touch support
    chartEl.ontouchstart=(e)=>{isDragging=true;dragStartX=e.touches[0].clientX;dragStartViewStart=viewStart;};
    chartEl.ontouchmove=(e)=>{
      if(!isDragging)return;e.preventDefault();
      const dx=e.touches[0].clientX-dragStartX;
      const visLen=viewEnd-viewStart;
      const pxPerCandle=chartEl.offsetWidth/(visLen||1);
      const shift=Math.round(-dx/pxPerCandle);
      const newStart=Math.max(0,Math.min(total-visLen,dragStartViewStart+shift));
      viewStart=newStart;viewEnd=newStart+visLen;
      render(curData,null);
    };
    chartEl.ontouchend=()=>{isDragging=false;};
  }
}

  }

  // Risk Factors
  if(ai?.riskFactors?.length){
    h+=`<div class="card" style="background:rgba(232,93,117,0.03);border-color:rgba(232,93,117,0.12)">
      <div class="mono" style="font-size:9px;color:#E85D75;letter-spacing:0.1em;margin-bottom:8px">주의 사항</div>

      </div>
    </div>`;

      const dc=p.direction==="bullish"?"#4ECCA3":p.direction==="bearish"?"#E85D75":"#C9A96E";
      const cp=data?.currentPrice||visData[visData.length-1]?.close||0;

      h+=`<div class="card" style="border-left:3px solid ${dc};padding:20px;margin-bottom:14px">
        <!-- Header -->
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
          <div>
            <div style="font-size:16px;font-weight:700;color:#F0ECE3">${p.name}</div>
            <div class="mono" style="font-size:10px;color:#666;margin-top:2px">${p.nameEn||""}</div>
          </div>
          <div style="display:flex;gap:5px;align-items:center">
            <span class="badge" style="background:${dc}12;color:${dc};border:1px solid ${dc}25">${p.direction==="bullish"?"강세":p.direction==="bearish"?"약세":"중립"}</span>
            <span class="badge" style="background:#C9A96E12;color:#C9A96E;border:1px solid #C9A96E25">신뢰도 ${p.confidence}%</span>
          </div>
        </div>
        <!-- Pattern Chart with Overlay -->
        <div class="chart-box" style="margin-bottom:14px;padding:8px 6px 4px">${svgPatternChart(visData,p,cp,data?.currency,pi)}</div>
        <!-- Probability Bar -->
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
          <span class="mono" style="font-size:9px;color:#4ECCA3;width:50px">상승 ${p.bullProb}%</span>
          <div style="flex:1;height:8px;border-radius:4px;overflow:hidden;background:#1a1a24;display:flex">
            <div style="width:${p.bullProb}%;background:linear-gradient(90deg,#2D7A5F,#4ECCA3)"></div>
            <div style="width:${p.bearProb}%;background:linear-gradient(90deg,#E85D75,#9B3A4A)"></div>
          </div>
          <span class="mono" style="font-size:9px;color:#E85D75;width:50px;text-align:right">하락 ${p.bearProb}%</span>
        </div>
        <!-- Metrics Grid -->
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:12px">
          <div style="background:rgba(240,236,227,0.04);border:1px solid rgba(240,236,227,0.1);border-radius:6px;padding:10px;text-align:center">
            <div class="mono" style="font-size:8px;color:#88847d;margin-bottom:3px">진입가</div>
            <div class="mono" style="font-size:13px;color:#F0ECE3;font-weight:600">${cp?cs+fp(cp):"-"}</div>
          </div>
          <div style="background:rgba(78,204,163,0.06);border:1px solid rgba(78,204,163,0.15);border-radius:6px;padding:10px;text-align:center">
            <div class="mono" style="font-size:8px;color:#4ECCA3;margin-bottom:3px">▲ 목표가</div>
            <div class="mono" style="font-size:13px;color:#4ECCA3;font-weight:700">${p.targetUp?cs+fp(p.targetUp):"-"}</div>
            ${pctUp?`<div class="mono" style="font-size:10px;color:#4ECCA3;opacity:0.7;margin-top:2px">+${pctUp}%</div>`:""}
          </div>
          <div style="background:rgba(232,93,117,0.06);border:1px solid rgba(232,93,117,0.15);border-radius:6px;padding:10px;text-align:center">
            <div class="mono" style="font-size:8px;color:#E85D75;margin-bottom:3px">▼ 하락 예상</div>
            <div class="mono" style="font-size:13px;color:#E85D75;font-weight:700">${p.targetDown?cs+fp(p.targetDown):"-"}</div>
            ${pctDn?`<div class="mono" style="font-size:10px;color:#E85D75;opacity:0.7;margin-top:2px">-${pctDn}%</div>`:""}
          </div>
          <div style="background:rgba(201,169,110,0.06);border:1px solid rgba(201,169,110,0.15);border-radius:6px;padding:10px;text-align:center">
            <div class="mono" style="font-size:8px;color:#C9A96E;margin-bottom:3px">◈ 손절가</div>
            <div class="mono" style="font-size:13px;color:#C9A96E;font-weight:700">${p.stopLoss?cs+fp(p.stopLoss):"-"}</div>
          </div>
        </div>
        <!-- Reasoning -->
        <p class="noto" style="font-size:12px;color:#aaa;line-height:1.7;margin:0">${p.reasoning||""}</p>
        ${p.pctFromLow?`<div class="mono" style="font-size:10px;color:#888;margin-top:8px">저점 대비: ${p.pctFromLow} · 목표까지: ${p.pctToTarget||"-"}</div>`:""}
      </div>`;

  // Volume Analysis

  return h;
}

// ═══════ PATTERN CHART (individual per pattern) ═══════
function svgPatternChart(data,pat,cp,cur,idx){
  if(!data||!data.length)return"";
  const W=780,H=280,P={t:20,r:80,b:30,l:8},cw=W-P.l-P.r,ch=H-P.t-P.b;
  const dc=pat.direction==="bullish"?"#4ECCA3":pat.direction==="bearish"?"#E85D75":"#C9A96E";
  const cs=cur==="KRW"?"₩":"$";
  const fm=v=>v>=10000?(v/10000).toFixed(1)+"만":v>=1000?(v/1000).toFixed(1)+"K":v.toFixed(v<10?4:2);

  // Price range
  const aP=data.flatMap(d=>[d.high,d.low]);
  if(cp)aP.push(cp);
  if(pat.targetUp)aP.push(pat.targetUp);
  if(pat.targetDown)aP.push(pat.targetDown);
  if(pat.stopLoss)aP.push(pat.stopLoss);
  if(pat.keyPrices)pat.keyPrices.forEach(p=>aP.push(p));
  const mn=Math.min(...aP)*.993,mx=Math.max(...aP)*1.007;
  const tx=i=>P.l+(i/(data.length-1||1))*cw;
  const ty=p=>P.t+(1-(p-mn)/(mx-mn||1))*ch;
  const bw=Math.max(1,Math.min(6,cw/data.length*.5));

  let s=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-height:300px">`;

  // Grid
  for(let i=0;i<=4;i++){const p=mn+(mx-mn)*(i/4);s+=`<line x1="${P.l}" y1="${ty(p)}" x2="${W-P.r}" y2="${ty(p)}" stroke="#fff" stroke-opacity=".03"/><text x="${W-P.r+6}" y="${ty(p)+3}" fill="#555" font-size="7.5" font-family="DM Mono,monospace">${fm(p)}</text>`;}

  // Candles (dimmed as background)
  data.forEach((d,i)=>{
    const x=tx(i),bl=d.close>=d.open,cl=bl?"#4ECCA3":"#E85D75";
    const bt=ty(Math.max(d.open,d.close)),bb=ty(Math.min(d.open,d.close));
    s+=`<line x1="${x}" y1="${ty(d.high)}" x2="${x}" y2="${ty(d.low)}" stroke="${cl}" stroke-width=".8" opacity=".4"/>`;
    s+=`<rect x="${x-bw/2}" y="${bt}" width="${bw}" height="${Math.max(bb-bt,1)}" fill="${cl}" opacity=".5" rx=".5"/>`;
  });

  // ★ Pattern Shape Overlay
  const visLen=viewEnd-viewStart;
  const si=pat.startIdx!=null?Math.max(0,pat.startIdx-viewStart):Math.max(0,data.length-60);
  const ei=pat.endIdx!=null?Math.min(data.length-1,pat.endIdx-viewStart):data.length-1;

  if(pat.keyPrices&&pat.keyPrices.length>=2){
    // Draw pattern shape through key prices
    const kLen=pat.keyPrices.length;
    const kPts=pat.keyPrices.map((kp,ki)=>{
      const kx=tx(si+Math.round((ei-si)*ki/(kLen-1||1)));
      return [kx,ty(kp)];
    });
    // Shaded zone
    const zoneTop=Math.min(...pat.keyPrices),zoneBot=Math.max(...pat.keyPrices);
    s+=`<rect x="${tx(si)}" y="${ty(zoneBot)}" width="${tx(ei)-tx(si)}" height="${ty(zoneTop)-ty(zoneBot)}" fill="${dc}" opacity=".05" rx="4"/>`;
    // Pattern line (thick, with glow)
    const pathD=kPts.map((pt,i)=>`${i===0?"M":"L"}${pt[0].toFixed(1)},${pt[1].toFixed(1)}`).join(" ");
    s+=`<path d="${pathD}" fill="none" stroke="${dc}" stroke-width="3" opacity=".2" stroke-linecap="round" stroke-linejoin="round"/>`;
    s+=`<path d="${pathD}" fill="none" stroke="${dc}" stroke-width="2" opacity=".7" stroke-linecap="round" stroke-linejoin="round"/>`;
    // Key price dots
    kPts.forEach((pt,ki)=>{
      s+=`<circle cx="${pt[0]}" cy="${pt[1]}" r="4" fill="${dc}" opacity=".8"/>`;
      s+=`<circle cx="${pt[0]}" cy="${pt[1]}" r="6" fill="none" stroke="${dc}" opacity=".3" stroke-width="1"/>`;
    });
  } else {
    // Fallback: draw simple neckline between support levels
    if(pat.targetDown&&pat.stopLoss){
      const neckY=ty(Math.max(pat.targetDown,pat.stopLoss));
      s+=`<line x1="${tx(si)}" y1="${neckY}" x2="${tx(ei)}" y2="${neckY}" stroke="${dc}" stroke-width="1.5" stroke-dasharray="6,3" opacity=".5"/>`;
    }
  }

  // Current price line
  if(cp){
    s+=`<line x1="${P.l}" y1="${ty(cp)}" x2="${W-P.r}" y2="${ty(cp)}" stroke="#C9A96E" stroke-width="1" opacity=".5" stroke-dasharray="4,3"/>`;
    s+=`<rect x="${W-P.r+2}" y="${ty(cp)-8}" width="72" height="16" rx="3" fill="rgba(201,169,110,.2)" stroke="#C9A96E40"/>`;
    s+=`<text x="${W-P.r+8}" y="${ty(cp)+3}" fill="#C9A96E" font-size="8" font-weight="600" font-family="DM Mono,monospace">${fm(cp)}</text>`;
  }

  // Target line + arrow
  if(pat.targetUp&&pat.targetUp>mn&&pat.targetUp<mx){
    const tY=ty(pat.targetUp);
    s+=`<line x1="${P.l}" y1="${tY}" x2="${W-P.r}" y2="${tY}" stroke="#4ECCA3" stroke-width="1" stroke-dasharray="3,3" opacity=".6"/>`;
    s+=`<rect x="${W-P.r+2}" y="${tY-8}" width="72" height="16" rx="3" fill="rgba(78,204,163,.15)" stroke="#4ECCA330"/>`;
    s+=`<text x="${W-P.r+8}" y="${tY+3}" fill="#4ECCA3" font-size="8" font-weight="600" font-family="DM Mono,monospace">${fm(pat.targetUp)}</text>`;
    // Arrow from current to target
    if(cp){
      const arX=tx(data.length-1)+12;
      s+=`<line x1="${arX}" y1="${ty(cp)}" x2="${arX}" y2="${tY}" stroke="#4ECCA3" stroke-width="1.5" opacity=".5" marker-end="url(#arrowUp${idx||0})"/>`;
      // Percentage label on arrow
      const midY=(ty(cp)+tY)/2;
      const pct=((pat.targetUp/cp-1)*100).toFixed(1);
      s+=`<rect x="${arX+4}" y="${midY-8}" width="${pct.length*7+20}" height="16" rx="3" fill="rgba(78,204,163,.2)"/>`;
      s+=`<text x="${arX+10}" y="${midY+3}" fill="#4ECCA3" font-size="9" font-weight="700" font-family="DM Mono,monospace">+${pct}%</text>`;
    }
  }

  // Target down line
  if(pat.targetDown&&pat.targetDown>mn&&pat.targetDown<mx){
    const tY=ty(pat.targetDown);
    s+=`<line x1="${P.l}" y1="${tY}" x2="${W-P.r}" y2="${tY}" stroke="#E85D75" stroke-width="1" stroke-dasharray="3,3" opacity=".5"/>`;
    s+=`<rect x="${W-P.r+2}" y="${tY-8}" width="72" height="16" rx="3" fill="rgba(232,93,117,.12)" stroke="#E85D7530"/>`;
    s+=`<text x="${W-P.r+8}" y="${tY+3}" fill="#E85D75" font-size="8" font-weight="600" font-family="DM Mono,monospace">${fm(pat.targetDown)}</text>`;
  }

  // Stop loss line
  if(pat.stopLoss&&pat.stopLoss>mn&&pat.stopLoss<mx){
    const slY=ty(pat.stopLoss);
    s+=`<line x1="${tx(Math.max(0,data.length-40))}" y1="${slY}" x2="${W-P.r}" y2="${slY}" stroke="#C9A96E" stroke-width="1" stroke-dasharray="2,3" opacity=".4"/>`;
    s+=`<text x="${tx(Math.max(0,data.length-40))-4}" y="${slY+3}" fill="#C9A96E" font-size="7.5" font-family="DM Mono,monospace" text-anchor="end">SL</text>`;
  }

  // Arrow marker definition
  s+=`<defs><marker id="arrowUp${idx||0}" viewBox="0 0 10 10" refX="5" refY="10" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,10 L5,0 L10,10" fill="#4ECCA3" opacity=".6"/></marker></defs>`;

  // Pattern name label
  s+=`<text x="${P.l+4}" y="14" fill="${dc}" font-size="9" font-weight="600" font-family="DM Mono,monospace">${pat.name} (${pat.confidence}%)</text>`;

  // Date labels
  data.filter((_,i)=>i%Math.max(1,Math.floor(data.length/6))===0).forEach(d=>{const i=data.indexOf(d);s+=`<text x="${tx(i)}" y="${H-P.b+14}" fill="#444" font-size="7" font-family="DM Mono,monospace" text-anchor="middle">${(d.date||"").slice(5)}</text>`;});

  s+=`</svg>`;
  return s;
}

// ═══════ CHART SVG ═══════
function svgChart(data,cp,cur,ai,stockName){
  const W=900,H=520,P={t:28,r:92,b:44,l:8},cw=W-P.l-P.r,ch=H-P.t-P.b;
  const aP=data.flatMap(d=>[d.high,d.low]);if(cp)aP.push(cp);
  (ai?.supports||[]).forEach(s=>aP.push(s));(ai?.resistances||[]).forEach(r=>aP.push(r));
  (ai?.detectedPatterns||[]).forEach(p=>{if(p.targetUp)aP.push(p.targetUp);if(p.targetDown)aP.push(p.targetDown);});
  const mn=Math.min(...aP)*.994,mx=Math.max(...aP)*1.006;
  const tx=i=>P.l+(i/(data.length-1||1))*cw,ty=p=>P.t+(1-(p-mn)/(mx-mn||1))*ch;
  const bw=Math.max(1.5,Math.min(8,cw/data.length*.55)),cs=cur==="KRW"?"₩":"$";
  const fm=v=>v>=10000?(v/10000).toFixed(1)+"만":v>=1000?(v/1000).toFixed(1)+"K":v.toFixed(v<10?4:2);
  let s=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-height:540px">`;

  // Grid
  for(let i=0;i<=6;i++){const p=mn+(mx-mn)*(i/6);s+=`<line x1="${P.l}" y1="${ty(p)}" x2="${W-P.r}" y2="${ty(p)}" stroke="#fff" stroke-opacity=".035"/><text x="${W-P.r+6}" y="${ty(p)+3.5}" fill="#555" font-size="8" font-family="DM Mono,monospace">${fm(p)}</text>`;}

  // Support/Resistance with labels and zones
  (ai?.supports||[]).forEach((v,i)=>{
    s+=`<line x1="${P.l}" y1="${ty(v)}" x2="${W-P.r}" y2="${ty(v)}" stroke="#E85D75" stroke-dasharray="6,4" opacity=".4"/>`;
    s+=`<rect x="${W-P.r+2}" y="${ty(v)-8}" width="86" height="16" rx="3" fill="rgba(232,93,117,.1)" stroke="#E85D7530"/>`;
    s+=`<text x="${W-P.r+6}" y="${ty(v)+3}" fill="#E85D75" font-size="8" font-family="DM Mono,monospace">S${i+1} ${fm(v)}</text>`;
  });
  (ai?.resistances||[]).forEach((v,i)=>{
    s+=`<line x1="${P.l}" y1="${ty(v)}" x2="${W-P.r}" y2="${ty(v)}" stroke="#4ECCA3" stroke-dasharray="6,4" opacity=".4"/>`;
    s+=`<rect x="${W-P.r+2}" y="${ty(v)-8}" width="86" height="16" rx="3" fill="rgba(78,204,163,.1)" stroke="#4ECCA330"/>`;
    s+=`<text x="${W-P.r+6}" y="${ty(v)+3}" fill="#4ECCA3" font-size="8" font-family="DM Mono,monospace">R${i+1} ${fm(v)}</text>`;
  });

  // Pattern labels only (detailed overlay in individual pattern charts below)
  (ai?.detectedPatterns||[]).forEach((p,i)=>{
    const c=p.direction==="bullish"?"#4ECCA3":p.direction==="bearish"?"#E85D75":"#C9A96E";
    const labelText=`${p.name} (${p.confidence}%)`;
    s+=`<rect x="${P.l+4}" y="${P.t+6+i*20}" width="${Math.min(labelText.length*6.5+20,220)}" height="16" rx="3" fill="${c}12" stroke="${c}25" stroke-width=".5"/>`;
    s+=`<circle cx="${P.l+13}" cy="${P.t+14+i*20}" r="2.5" fill="${c}"/>`;
    s+=`<text x="${P.l+20}" y="${P.t+18+i*20}" fill="${c}" font-size="8.5" font-weight="500" font-family="DM Mono,monospace">${labelText}</text>`;
  });

  // MAs
  const cma=(n)=>data.map((_,i)=>i<n-1?null:data.slice(i-n+1,i+1).reduce((s,d)=>s+d.close,0)/n);
  [{v:cma(5),c:"#E8A87C",w:1},{v:cma(20),c:"#85C1E9",w:1.2},{v:cma(100),c:"#C39BD3",w:1.5},{v:cma(250),c:"#7DCEA0",w:1.8}].forEach(m=>{const pts=m.v.map((v,i)=>v!=null?`${tx(i).toFixed(1)},${ty(v).toFixed(1)}`:null).filter(Boolean);if(pts.length>1)s+=`<polyline points="${pts.join(" ")}" fill="none" stroke="${m.c}" stroke-width="${m.w}" opacity=".5"/>`;});

  // Bollinger Bands
  const bbS=[];for(let i=19;i<data.length;i++){const sl=data.slice(i-19,i+1).map(d=>d.close);const ma=sl.reduce((a,b)=>a+b,0)/20;const std=Math.sqrt(sl.reduce((s,v)=>s+Math.pow(v-ma,2),0)/20);bbS.push({u:ma+2*std,m:ma,l:ma-2*std});}
  if(bbS.length>1){const off=data.length-bbS.length;
    const uPts=bbS.map((b,i)=>`${tx(i+off).toFixed(1)},${ty(b.u).toFixed(1)}`);
    const lPts=bbS.map((b,i)=>`${tx(i+off).toFixed(1)},${ty(b.l).toFixed(1)}`).reverse();
    s+=`<polygon points="${uPts.join(" ")} ${lPts.join(" ")}" fill="#C39BD3" opacity=".04"/>`;
    s+=`<polyline points="${uPts.join(" ")}" fill="none" stroke="#C39BD3" stroke-width=".7" opacity=".25" stroke-dasharray="3,3"/>`;
    s+=`<polyline points="${lPts.reverse().join(" ")}" fill="none" stroke="#C39BD3" stroke-width=".7" opacity=".25" stroke-dasharray="3,3"/>`;
  }

  // ★ Auto Trendlines (linear regression of swing highs/lows)
  if(data.length>=20){
    const swH=[],swL=[];
    for(let i=3;i<data.length-3;i++){
      const win=data.slice(i-3,i+4);
      if(data[i].high>=Math.max(...win.map(d=>d.high)))swH.push({i,p:data[i].high});
      if(data[i].low<=Math.min(...win.map(d=>d.low)))swL.push({i,p:data[i].low});
    }
    const linReg=(pts)=>{
      if(pts.length<2)return null;
      const n=pts.length;let sx=0,sy=0,sxy=0,sx2=0;
      pts.forEach(p=>{sx+=p.i;sy+=p.p;sxy+=p.i*p.p;sx2+=p.i*p.i;});
      const det=n*sx2-sx*sx;if(Math.abs(det)<0.001)return null;
      const slope=(n*sxy-sx*sy)/det,intercept=(sy-slope*sx)/n;
      return {slope,intercept,eval:(x)=>slope*x+intercept};
    };
    const cutoff=Math.floor(data.length*0.4);
    const recentH=swH.filter(p=>p.i>=cutoff),recentL=swL.filter(p=>p.i>=cutoff);
    const regH=linReg(recentH);
    if(regH&&Math.abs(regH.slope)>0.0001){
      const y1=ty(regH.eval(cutoff)),y2=ty(regH.eval(data.length-1));
      const col=regH.slope>0?"#4ECCA3":"#E85D75";
      s+=`<line x1="${tx(cutoff)}" y1="${y1}" x2="${tx(data.length-1)}" y2="${y2}" stroke="${col}" stroke-width="1.5" opacity=".35" stroke-dasharray="8,4"/>`;
      s+=`<text x="${tx(data.length-1)+4}" y="${y2+3}" fill="${col}" font-size="7" font-family="DM Mono,monospace" opacity=".5">상단추세</text>`;
    }
    const regL=linReg(recentL);
    if(regL&&Math.abs(regL.slope)>0.0001){
      const y1=ty(regL.eval(cutoff)),y2=ty(regL.eval(data.length-1));
      const col=regL.slope>0?"#4ECCA3":"#E85D75";
      s+=`<line x1="${tx(cutoff)}" y1="${y1}" x2="${tx(data.length-1)}" y2="${y2}" stroke="${col}" stroke-width="1.5" opacity=".35" stroke-dasharray="8,4"/>`;
      s+=`<text x="${tx(data.length-1)+4}" y="${y2+3}" fill="${col}" font-size="7" font-family="DM Mono,monospace" opacity=".5">하단추세</text>`;
    }
  }

  // Candles
  data.forEach((d,i)=>{const x=tx(i),bl=d.close>=d.open,cl=bl?"#4ECCA3":"#E85D75",bt=ty(Math.max(d.open,d.close)),bb=ty(Math.min(d.open,d.close));s+=`<line x1="${x}" y1="${ty(d.high)}" x2="${x}" y2="${ty(d.low)}" stroke="${cl}" stroke-width="1" opacity=".7"/><rect x="${x-bw/2}" y="${bt}" width="${bw}" height="${Math.max(bb-bt,1)}" fill="${cl}" rx=".5" opacity=".85"/>`;});

  // Current price
  if(cp){s+=`<line x1="${P.l}" y1="${ty(cp)}" x2="${W-P.r}" y2="${ty(cp)}" stroke="#C9A96E" stroke-width="1.5" opacity=".6" stroke-dasharray="4,2"/><rect x="${W-P.r}" y="${ty(cp)-9}" width="86" height="18" rx="4" fill="rgba(201,169,110,.25)" stroke="#C9A96E" stroke-width=".5"/><text x="${W-P.r+6}" y="${ty(cp)+4}" fill="#C9A96E" font-size="9" font-weight="700" font-family="DM Mono,monospace">${cs}${fm(cp)}</text>`;}

  // Date labels
  data.filter((_,i)=>i%Math.max(1,Math.floor(data.length/8))===0).forEach(d=>{const i=data.indexOf(d);s+=`<text x="${tx(i)}" y="${H-P.b+16}" fill="#444" font-size="7.5" font-family="DM Mono,monospace" text-anchor="middle">${(d.date||"").slice(5)}</text>`;});

  // MA Legend
  [{c:"#E8A87C",l:"5"},{c:"#85C1E9",l:"20"},{c:"#C39BD3",l:"100"},{c:"#7DCEA0",l:"250"}].forEach((m,i)=>{const x=W-P.r-180+i*46;s+=`<line x1="${x}" y1="12" x2="${x+10}" y2="12" stroke="${m.c}" stroke-width="1.5"/><text x="${x+14}" y="15" fill="${m.c}" font-size="7" font-family="DM Mono,monospace">MA${m.l}</text>`;});

  // Data badge + Stock name
  s+=`<text x="${P.l+4}" y="${H-6}" fill="#4ECCA3" font-size="7.5" font-family="DM Mono,monospace">● ${curData?.source||"api"} ${data.length}봉</text>`;
  if(stockName){
    s+=`<text x="${W-P.r}" y="${H-6}" fill="#666" font-size="8" font-family="DM Mono,monospace" text-anchor="end">${stockName}</text>`;
    s+=`<text x="${W/2}" y="16" fill="#F0ECE3" font-size="12" font-weight="700" font-family="Outfit,sans-serif" text-anchor="middle" opacity=".25">${stockName}</text>`;
  }
  s+=`</svg>`;
  return s;
}

// ═══════ RSI CHART ═══════
function svgRSI(data){
  const cls=data.map(d=>d.close);if(cls.length<15)return`<div class="mono" style="text-align:center;padding:16px;color:#555;font-size:10px">RSI: 15봉 이상 필요</div>`;
  const n=14,rs=[];for(let e=n;e<=cls.length;e++){let g=0,l=0;for(let i=1;i<=n;i++){const d=cls[e-n+i]-cls[e-n+i-1];d>0?g+=d:l+=Math.abs(d);}let ag=g/n,al=l/n;for(let i=n+1;i<e;i++){const d=cls[i]-cls[i-1];ag=(ag*(n-1)+(d>0?d:0))/n;al=(al*(n-1)+(d<0?Math.abs(d):0))/n;}rs.push(al===0?100:+(100-100/(1+ag/al)).toFixed(1));}
  const W=380,H=110,P={t:18,r:36,b:16,l:8},cw=W-P.l-P.r,ch=H-P.t-P.b;
  const tx=i=>P.l+(i/(rs.length-1||1))*cw,ty=v=>P.t+(1-v/100)*ch;
  const lv=rs[rs.length-1],rc=lv>70?"#E85D75":lv<30?"#4ECCA3":"#C9A96E";
  let s=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-height:120px">`;
  s+=`<text x="${P.l+2}" y="12" fill="#C9A96E" font-size="8" font-weight="600" font-family="DM Mono,monospace">RSI(14)</text><text x="${W-P.r}" y="12" fill="${rc}" font-size="9" font-weight="700" font-family="DM Mono,monospace" text-anchor="end">${lv}</text>`;
  s+=`<rect x="${P.l}" y="${ty(100)}" width="${cw}" height="${ty(70)-ty(100)}" fill="rgba(78,204,163,.03)"/><rect x="${P.l}" y="${ty(30)}" width="${cw}" height="${ty(0)-ty(30)}" fill="rgba(232,93,117,.03)"/>`;
  [30,50,70].forEach(v=>{s+=`<line x1="${P.l}" y1="${ty(v)}" x2="${W-P.r}" y2="${ty(v)}" stroke="#fff" stroke-opacity="${v===50?".05":".07"}" stroke-dasharray="3,4"/><text x="${W-P.r+3}" y="${ty(v)+3}" fill="${v>=70?"#E85D75":v<=30?"#4ECCA3":"#555"}" font-size="7" font-family="DM Mono,monospace">${v}</text>`;});
  s+=`<polyline points="${rs.map((v,i)=>`${tx(i).toFixed(1)},${ty(v).toFixed(1)}`).join(" ")}" fill="none" stroke="${rc}" stroke-width="1.3" stroke-linecap="round"/><circle cx="${tx(rs.length-1)}" cy="${ty(lv)}" r="2.5" fill="${rc}"/></svg>`;
  return s;
}

// ═══════ MACD CHART ═══════
function svgMACD(data){
  const cls=data.map(d=>d.close);if(cls.length<35)return`<div class="mono" style="text-align:center;padding:16px;color:#555;font-size:10px">MACD: 35봉 이상 필요</div>`;
  const ema=(d,n)=>{const k=2/(n+1);let e=[d[0]];for(let i=1;i<d.length;i++)e.push(d[i]*k+e[i-1]*(1-k));return e;};
  const e12=ema(cls,12),e26=ema(cls,26),ml=e12.map((v,i)=>v-e26[i]);
  const slR=ema(ml.slice(26),9),sl=Array(34).fill(null).concat(slR);
  const hl=ml.map((v,i)=>sl[i]!=null?v-sl[i]:null);
  const st=26,m=ml.slice(st),sg=sl.slice(st),hi=hl.slice(st);
  const W=380,H=110,P={t:18,r:36,b:16,l:8},cw=W-P.l-P.r,ch=H-P.t-P.b;
  const aV=[...m,...sg.filter(v=>v!=null),...hi.filter(v=>v!=null)];
  const vM=Math.max(...aV.map(Math.abs))*1.1||1;
  const tx=i=>P.l+(i/(m.length-1||1))*cw,ty=v=>P.t+ch/2-(v/vM)*(ch/2);
  const bw=Math.max(1,Math.min(5,cw/m.length*.65));
  let s=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-height:120px">`;
  s+=`<text x="${P.l+2}" y="12" fill="#C39BD3" font-size="8" font-weight="600" font-family="DM Mono,monospace">MACD(12,26,9)</text><text x="${W-P.r}" y="12" fill="${hi[hi.length-1]>0?"#4ECCA3":"#E85D75"}" font-size="9" font-weight="700" font-family="DM Mono,monospace" text-anchor="end">${m[m.length-1]?.toFixed(2)||"-"}</text>`;
  s+=`<line x1="${P.l}" y1="${ty(0)}" x2="${W-P.r}" y2="${ty(0)}" stroke="#fff" stroke-opacity=".06"/>`;
  hi.forEach((v,i)=>{if(v==null)return;const x=tx(i),y0=ty(0),y1=ty(v);s+=`<rect x="${x-bw/2}" y="${Math.min(y0,y1)}" width="${bw}" height="${Math.abs(y1-y0)||1}" fill="${v>=0?"#4ECCA3":"#E85D75"}" opacity=".45" rx=".5"/>`;});
  s+=`<polyline points="${m.map((v,i)=>`${tx(i).toFixed(1)},${ty(v).toFixed(1)}`).join(" ")}" fill="none" stroke="#85C1E9" stroke-width="1.2"/>`;
  const sP=sg.map((v,i)=>v!=null?`${tx(i).toFixed(1)},${ty(v).toFixed(1)}`:null).filter(Boolean);
  if(sP.length>1)s+=`<polyline points="${sP.join(" ")}" fill="none" stroke="#E8A87C" stroke-width="1.2" stroke-dasharray="3,2"/>`;
  s+=`</svg>`;
  return s;
}

// ═══════ WATCHLIST ═══════
function addToWatchlist(){
  if(!curSym)return;
  if(watchlist.find(w=>w.symbol===curSym.symbol))return;
  watchlist.push({symbol:curSym.symbol,source:curSym.source,name:curSym.name||curSym.symbol,addedAt:new Date().toISOString()});
  localStorage.setItem("wl",JSON.stringify(watchlist));
  document.getElementById("addWlBtn").textContent="✓ 추가됨";
  setTimeout(()=>{document.getElementById("addWlBtn").textContent="+ 워치리스트";},1500);
}
function removeFromWatchlist(sym){
  watchlist=watchlist.filter(w=>w.symbol!==sym);
  localStorage.setItem("wl",JSON.stringify(watchlist));
  renderWatchlist();
}
function clearWatchlist(){if(!confirm("워치리스트를 모두 삭제하시겠습니까?"))return;watchlist=[];localStorage.setItem("wl","[]");renderWatchlist();}

function renderWatchlist(){
  document.getElementById("wlCount").textContent=watchlist.length+"종목";
  const el=document.getElementById("wlList"),emp=document.getElementById("wlEmpty");
  if(!watchlist.length){el.innerHTML="";emp.style.display="block";return;}
  emp.style.display="none";
  el.innerHTML=watchlist.map(w=>`
    <div class="card wl-item" onclick="qkFromWl('${w.symbol}','${w.source}')">
      <div style="flex:1">
        <div style="font-size:13px;font-weight:600;color:#F0ECE3">${w.name}</div>
        <div class="mono" style="font-size:10px;color:#666;margin-top:1px">${w.symbol} · ${w.source}</div>
      </div>
      <div id="wl_${w.symbol.replace(/[^a-zA-Z0-9]/g,"_")}" class="mono" style="font-size:12px;color:#888">—</div>
      <button onclick="event.stopPropagation();removeFromWatchlist('${w.symbol}')" style="background:none;border:none;color:#E85D7560;cursor:pointer;font-size:14px;padding:4px 8px">✕</button>
    </div>
  `).join("");
}

function qkFromWl(sym,sr){switchTab("analyze");inp.value=sym;selSym={symbol:sym,source:sr};setSrc(sr);hideDrop();fetchData();}

async function scanWatchlist(){
  if(!watchlist.length)return;
  const msg=document.getElementById("wlScanMsg");msg.style.display="block";
  const syms=watchlist.map(w=>w.symbol).join(",");
  const srcs=watchlist.map(w=>w.source).join(",");
  try{
    const r=await(await fetch(`/api/watchlist?symbols=${encodeURIComponent(syms)}&sources=${encodeURIComponent(srcs)}`)).json();
    (r.results||[]).forEach(res=>{
      const id="wl_"+res.symbol.replace(/[^a-zA-Z0-9]/g,"_");
      const el=document.getElementById(id);if(!el)return;
      const cs=res.currency==="KRW"?"₩":"$";
      let html=`<span style="color:${res.change>=0?"#4ECCA3":"#E85D75"};font-weight:600">${cs}${Number(res.currentPrice).toLocaleString()} ${res.change>=0?"▲":"▼"}${Math.abs(res.change)}%</span>`;
      if(res.signals?.length){
        res.signals.forEach(s=>{
          const sc=s.type==="bullish"||s.type==="opportunity"?"#4ECCA3":s.type==="bearish"||s.type==="warning"?"#E85D75":"#C9A96E";
          html+=` <span class="wl-signal" style="background:${sc}10;color:${sc};border:1px solid ${sc}25">${s.msg}</span>`;
        });
      }
      el.innerHTML=html;
    });
  }catch(e){console.warn("Scan error:",e);}
  finally{msg.style.display="none";}
}

let patFilter="all";
function filterPat(c){patFilter=c;document.querySelectorAll("#patCatBar .tf-btn").forEach(b=>b.classList.toggle("on",b.dataset.c===c));renderPatterns();}

function renderPatterns(){
  const list=patFilter==="all"?PAT_DB:PAT_DB.filter(p=>p.cat===patFilter);
  const catCol={reversal:"#E8A87C",continuation:"#85C1E9",candlestick:"#C39BD3",harmonic:"#7DCEA0"};
  const el=document.getElementById("patList");
  el.innerHTML=list.map(p=>{
    const dc=p.dir==="bullish"?"#4ECCA3":p.dir==="bearish"?"#E85D75":"#C9A96E";
    const cc=catCol[p.cat]||"#888";
    const maxProb=Math.max(p.bull,p.bear);
    return `<div class="card" style="border-left:3px solid ${dc};margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div>
          <div style="font-size:15px;font-weight:700;color:#F0ECE3">${p.n}</div>
          <div class="mono" style="font-size:10px;color:#666;margin-top:2px">${p.en}</div>
        </div>
        <div style="display:flex;gap:5px">
          <span class="badge" style="background:${cc}12;color:${cc};border:1px solid ${cc}25">${p.cat==="reversal"?"반전":p.cat==="continuation"?"지속":p.cat==="candlestick"?"캔들":"하모닉"}</span>
          <span class="badge" style="background:${dc}12;color:${dc};border:1px solid ${dc}25">${p.dir==="bullish"?"강세":p.dir==="bearish"?"약세":"중립"}</span>
        </div>
      </div>
      <p class="noto" style="font-size:12px;color:#999;line-height:1.6;margin-bottom:12px">${p.desc}</p>
      <!-- Probability bar -->
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <span class="mono" style="font-size:9px;color:#4ECCA3;width:42px">상승 ${p.bull}%</span>
        <div style="flex:1;height:8px;border-radius:4px;overflow:hidden;background:#1a1a24;display:flex">
          <div style="width:${p.bull}%;background:linear-gradient(90deg,#2D7A5F,#4ECCA3);border-radius:4px 0 0 4px"></div>
          <div style="width:${p.bear}%;background:linear-gradient(90deg,#E85D75,#9B3A4A);border-radius:0 4px 4px 0"></div>
        </div>
        <span class="mono" style="font-size:9px;color:#E85D75;width:42px;text-align:right">하락 ${p.bear}%</span>
      </div>
      <!-- Key metrics -->
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:10px">
        <div style="background:rgba(78,204,163,.06);border:1px solid rgba(78,204,163,.15);border-radius:6px;padding:8px;text-align:center">
          <div class="mono" style="font-size:8px;color:#4ECCA3;margin-bottom:2px">평균 상승폭</div>
          <div class="mono" style="font-size:16px;font-weight:700;color:#4ECCA3">+${p.up}%</div>
        </div>
        <div style="background:rgba(232,93,117,.06);border:1px solid rgba(232,93,117,.15);border-radius:6px;padding:8px;text-align:center">
          <div class="mono" style="font-size:8px;color:#E85D75;margin-bottom:2px">평균 하락폭</div>
          <div class="mono" style="font-size:16px;font-weight:700;color:#E85D75">-${p.dn}%</div>
        </div>
        <div style="background:rgba(201,169,110,.06);border:1px solid rgba(201,169,110,.15);border-radius:6px;padding:8px;text-align:center">
          <div class="mono" style="font-size:8px;color:#C9A96E;margin-bottom:2px">성공 확률</div>
          <div class="mono" style="font-size:16px;font-weight:700;color:#C9A96E">${maxProb}%</div>
        </div>
        <div style="background:rgba(133,193,233,.06);border:1px solid rgba(133,193,233,.15);border-radius:6px;padding:8px;text-align:center">
          <div class="mono" style="font-size:8px;color:#85C1E9;margin-bottom:2px">리스크/리워드</div>
          <div class="mono" style="font-size:16px;font-weight:700;color:#85C1E9">1:${(p.up/Math.max(p.dn,1)).toFixed(1)}</div>
        </div>
      </div>
      <!-- Tips -->
      ${p.tip?`<div style="display:flex;flex-wrap:wrap;gap:5px">${p.tip.map(t=>`<span class="noto" style="font-size:10px;color:#888;background:#12121a;border:1px solid #1e1e2e;border-radius:6px;padding:3px 8px">💡 ${t}</span>`).join("")}</div>`:""}
    </div>`;
  }).join("");
}

renderWatchlist();
